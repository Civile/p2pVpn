<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P VPN</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem; height: 100vh;
    }
    header { display: flex; align-items: center; gap: .6rem; }
    header .logo { font-size: 1.5rem; }
    header h1 { font-size: 1.1rem; margin: 0; }
    .card { border: 1px solid #8884; border-radius: .6rem; padding: 1rem; }
    label { font-size: .85rem; opacity: .8; display: block; margin-bottom: .3rem; }
    input, select {
      width: 100%; padding: .55rem; font-size: 1rem; border-radius: .4rem;
      border: 1px solid #8886; background: transparent; color: inherit; margin-bottom: .8rem;
    }
    button {
      padding: .6rem 1rem; font-size: 1rem; cursor: pointer; border-radius: .4rem;
      border: none; background: #4f8cff; color: #fff; width: 100%;
    }
    button.secondary { background: transparent; border: 1px solid #8886; color: inherit; }
    button.danger { background: #e5484d; }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: .5rem; align-items: center; justify-content: space-between; }
    .badge { font-size: .8rem; padding: .15rem .6rem; border-radius: 1rem; background: #8883; }
    .badge.on { background: #1c7c3033; color: #1c7c30; }
    .badge.connecting { background: #d98a0033; color: #d98a00; }
    .badge.off { background: #8883; color: #888; }
    .badge.error { background: #e5484d33; color: #e5484d; }
    .hidden { display: none !important; }
    .device-name { font-weight: 600; font-size: 1.1rem; }
    .url {
      font-family: ui-monospace, monospace; font-size: .8rem; word-break: break-all;
      background: #8882; padding: .5rem; border-radius: .4rem; margin: .5rem 0;
    }
    #log {
      flex: 1; overflow-y: auto; font-family: ui-monospace, monospace; font-size: .74rem;
      background: #8881; border-radius: .5rem; padding: .6rem; white-space: pre-wrap; min-height: 6rem;
    }
    .muted { opacity: .6; font-size: .8rem; }
    .stack { display: flex; flex-direction: column; gap: .5rem; }
  </style>
</head>
<body>
  <header>
    <span class="logo">🔒</span>
    <h1>P2P VPN</h1>
  </header>

  <!-- Schermata di login (device-code flow) -->
  <section id="view-login" class="card hidden">
    <label for="name">Nome di questo dispositivo</label>
    <input id="name" placeholder="es. MacBook di Edoardo" />
    <button id="btn-login">Accedi via browser</button>
    <div id="login-progress" class="hidden">
      <p class="muted">Approva il dispositivo nella pagina che si è aperta nel browser.
        Se non si è aperta, apri questo link:</p>
      <div id="login-url" class="url"></div>
      <p class="muted">In attesa dell'approvazione…</p>
    </div>
  </section>

  <!-- Schermata principale: controllo VPN -->
  <section id="view-main" class="card hidden">
    <div class="row">
      <span class="device-name" id="dev-name">—</span>
      <span class="badge off" id="status">VPN spenta</span>
    </div>

    <div class="stack" style="margin-top:1rem">
      <div>
        <label for="exit-select">Exit node — esci da Internet tramite questo dispositivo</label>
        <div class="row" style="gap:.5rem">
          <select id="exit-select" style="margin-bottom:0"><option value="">Nessun exit node trovato</option></select>
          <button id="btn-refresh" class="secondary" style="width:auto; white-space:nowrap">↻</button>
        </div>
      </div>

      <button id="btn-vpn">Attiva VPN</button>
      <p class="muted" id="hint">Scegli un exit node e premi Attiva. Verrà chiesta la password (serve per instradare il traffico).</p>
    </div>

    <button id="btn-logout" class="secondary" style="margin-top:.8rem">Esci (rimuovi dispositivo)</button>
  </section>

  <div id="log">In avvio…</div>

  <script src="main.js"></script>
</body>
</html>
