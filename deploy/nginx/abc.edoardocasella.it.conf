# Reverse proxy per il backoffice del control plane (p2p-holepunch).
#
# L'app (binario `server`) gira dietro pm2 in ascolto su 127.0.0.1:8124.
# nginx termina il dominio pubblico e inoltra le richieste al processo locale.
#
# Deploy sul server DigitalOcean:
#   sudo cp deploy/nginx/abc.edoardocasella.it.conf /etc/nginx/sites-available/abc.edoardocasella.it
#   sudo ln -s /etc/nginx/sites-available/abc.edoardocasella.it /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (dopo che il DNS punta al droplet):
#   sudo certbot --nginx -d abc.edoardocasella.it
# certbot aggiunge da solo il blocco 443 e il redirect 80 -> 443.

upstream vpn_backoffice {
    server 127.0.0.1:8124;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name abc.edoardocasella.it;

    # Log dedicati per questo vhost.
    access_log /var/log/nginx/abc.edoardocasella.it.access.log;
    error_log  /var/log/nginx/abc.edoardocasella.it.error.log;

    # Limite upload (il backoffice usa form piccoli: 2m è abbondante).
    client_max_body_size 2m;

    location / {
        proxy_pass http://vpn_backoffice;
        proxy_http_version 1.1;

        # Header di forwarding: l'app costruisce i link con PUBLIC_URL,
        # ma questi restano utili per logging/redirect corretti.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Supporto upgrade (WebSocket / connessioni long-lived), innocuo se non usato.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeout ragionevoli per un backoffice.
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}

# Mappa necessaria per l'header Connection in modalità upgrade.
# Se hai gia' una `map $http_upgrade $connection_upgrade` in nginx.conf,
# rimuovi questo blocco per evitare il duplicato.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
